name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  harness:
    name: harness (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (iced/winit)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run harness (fmt + check + test)
        shell: bash
        run: bash scripts/harness.sh --skip-clippy

  clippy:
    name: harness clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run harness clippy
        shell: bash
        run: bash scripts/harness.sh --skip-fmt --skip-check --skip-tests --strict-clippy
